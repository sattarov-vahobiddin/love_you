<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOVE</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #050505;
    overflow: hidden;
    font-family: Consolas, monospace;
  }

  #startScreen {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    background: #ffd9e2;
    transition: opacity 0.6s ease;
  }

  #startScreen.hidden {
    opacity: 0;
    pointer-events: none;
  }

  #startBtn {
    background: #ff4d6d;
    border: none;
    color: #ffffff;
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 2px;
    padding: 16px 40px;
    border-radius: 6px;
    cursor: pointer;
  }

  canvas {
    display: block;
    position: fixed;
    inset: 0;
  }

  #restartBtn {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: transparent;
    border: 1px solid rgba(255, 77, 109, 0.5);
    color: #ff4d6d;
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.6s ease;
    z-index: 5;
  }

  #restartBtn.show {
    opacity: 0.8;
  }

  #restartBtn:hover {
    opacity: 1;
  }
</style>
</head>
<body>

<div id="startScreen">
  <button id="startBtn">🤍</button>
</div>

<canvas id="canvas"></canvas>
<button id="restartBtn">🤍</button>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const startScreen = document.getElementById('startScreen');
const startBtn = document.getElementById('startBtn');
const restartBtn = document.getElementById('restartBtn');

const TEXT = "LOVE YOU";
const PINK = [255, 77, 109];
const BG = [5, 5, 5];

let W, H, points, animationId, lastTime;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
}
window.addEventListener('resize', resize);
resize();

let heartScale = 10;

function heartPoints() {
  const pts = [];
  const cx = W / 2, cy = H / 2;
  // Heart curve spans roughly 32 units wide, 26 units tall.
  // Fit it inside the screen with padding, using whichever dimension is tighter.
  const scale = Math.min((W * 0.85) / 32, (H * 0.85) / 26);
  heartScale = scale;

  function heartXY(t, s) {
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
    return { x: cx + x * scale * s, y: cy + y * scale * s };
  }

  // On smaller screens, reduce point density so text doesn't overlap.
  const density = Math.max(0.5, Math.min(1, W / 600));
  const outerCount = Math.round(180 * density);
  const innerCount = Math.round(80 * density);

  for (let i = 0; i < outerCount; i++) {
    const t = (i / outerCount) * Math.PI * 2;
    const p = heartXY(t, 1);
    pts.push({
      x: p.x, y: p.y,
      alpha: 0,
      target: 100 + Math.random() * 155,
      delay: Math.random() * 6000
    });
  }

  [0.2, 0.4, 0.6, 0.8].forEach(s => {
    for (let i = 0; i < innerCount; i++) {
      const t = (i / innerCount) * Math.PI * 2;
      const p = heartXY(t, s);
      pts.push({
        x: p.x, y: p.y,
        alpha: 0,
        target: 80 + Math.random() * 100,
        delay: Math.random() * 8000
      });
    }
  });

  return pts;
}

function lerpColor(alphaVal) {
  const a = alphaVal / 255;
  const r = Math.round(BG[0] + (PINK[0] - BG[0]) * a);
  const g = Math.round(BG[1] + (PINK[1] - BG[1]) * a);
  const b = Math.round(BG[2] + (PINK[2] - BG[2]) * a);
  return `rgb(${r}, ${g}, ${b})`;
}

function draw(now) {
  if (!lastTime) lastTime = now;
  const dt = now - lastTime;
  lastTime = now;

  ctx.fillStyle = `rgb(${BG[0]}, ${BG[1]}, ${BG[2]})`;
  ctx.fillRect(0, 0, W, H);
  const fontSize = Math.max(7, Math.min(13, heartScale * 0.6));
  ctx.font = `${fontSize}px Consolas, monospace`;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  for (const p of points) {
    if (p.delay > 0) {
      p.delay -= dt;
    } else {
      if (p.alpha < p.target) {
        p.alpha += 2 * (dt / 16.6667);
        if (p.alpha > p.target) p.alpha = p.target;
      }
    }

    const alphaVal = p.alpha;
    if (alphaVal > 0) {
      ctx.fillStyle = lerpColor(alphaVal);
      ctx.fillText(TEXT, p.x, p.y);
    }
  }

  animationId = requestAnimationFrame(draw);
}

function startAnimation() {
  resize();
  points = heartPoints();
  lastTime = null;
  if (animationId) cancelAnimationFrame(animationId);
  animationId = requestAnimationFrame(draw);
  restartBtn.classList.add('show');
}

startBtn.addEventListener('click', () => {
  startScreen.classList.add('hidden');
  startAnimation();
});

restartBtn.addEventListener('click', startAnimation);
</script>

</body>
</html>
